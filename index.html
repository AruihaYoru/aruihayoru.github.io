<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>github.is-a.tokyo | Monochrome Space</title>
    <meta name="description" content="A minimalist monochrome space with dynamic grid systems.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="grid-canvas"></canvas>
    
    <div class="scroll-container">
        <!-- Hero Section -->
        <section id="hero" class="v-section" data-grid="hero">
            <div class="content-box">
                <div class="marker-wrapper" data-marker-color="#000000">
                    <h1 class="hero-title marker-text">GITHUB.IS-A.TOKYO</h1>
                </div>
                <p class="tagline">EXPERIMENTAL SPACE / DYNAMIC TENSION</p>
            </div>
        </section>

        <!-- Section 1 -->
        <section id="section-1" class="v-section" data-grid="grid">
            <div class="content-box">
                <div class="marker-wrapper" data-marker-color="#000000">
                    <h2 class="section-title marker-text">STANDARD GRID</h2>
                </div>
                <p class="section-desc">Traditional Cartesian coordinate system representation.</p>
            </div>
        </section>

        <!-- Section 2 -->
        <section id="section-2" class="v-section" data-grid="diagonal">
            <div class="content-box">
                <div class="marker-wrapper" data-marker-color="#000000">
                    <h2 class="section-title marker-text">CROSS OVERLAY</h2>
                </div>
                <p class="section-desc">Interwoven lines forming a structural mesh.</p>
            </div>
        </section>

        <!-- Section 3 -->
        <section id="section-3" class="v-section" data-grid="dots">
            <div class="content-box">
                <div class="marker-wrapper" data-marker-color="#000000">
                    <h2 class="section-title marker-text">TICK GRID</h2>
                </div>
                <p class="section-desc">Short-stroke indicators marking precise coordinate units.</p>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="text-reveal.js"></script>
    <script src="grid-system.js"></script>
</body>
</html>
