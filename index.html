<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>github.is-a.tokyo</title>
    <meta name="description" content="Personal space for github.is-a.tokyo">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="scroll-container">
        <!-- Section 1: Default Black Marker -->
        <section class="section-hero">
            <div class="container">
                <div class="marker-wrapper">
                    <h1 class="marker-text">github.is-a.tokyo</h1>
                </div>
                <p class="status-label">Default Marker</p>
            </div>
        </section>

        <div class="section-spacer"></div>

        <!-- Section 2: Custom Color Marker (Red) -->
        <section class="section-hero">
            <div class="container">
                <div class="marker-wrapper" data-marker-color="#ff0000">
                    <h2 class="marker-text">Custom Red</h2>
                </div>
                <p class="status-label">data-marker-color="#ff0000"</p>
            </div>
        </section>

        <div class="section-spacer"></div>

        <!-- Section 3: Custom Trigger (Higher point) -->
        <section class="section-hero">
            <div class="container">
                <div class="marker-wrapper" data-marker-color="#000000" data-marker-trigger="0.7">
                    <h2 class="marker-text">Early Trigger</h2>
                </div>
                <p class="status-label">data-marker-trigger="0.7"</p>
            </div>
        </section>
    </div>

    <!-- Standalone Library -->
    <script src="text-reveal.js"></script>
</body>
</html>
